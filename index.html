<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: #000;
    font-family: 'Press Start 2P', 'Courier New', monospace;
    overflow: hidden;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    position: relative;
  }

  #title {
    position: fixed;
    top: 24px;
    left: 0; right: 0;
    text-align: center;
    color: #e6e6e6;
    font-size: 14px;
    letter-spacing: 3px;
    opacity: 0.85;
    z-index: 6;
    transition: opacity 0.4s ease;
  }
  #title.hidden { opacity: 0; pointer-events: none; }

  #home {
    position: relative;
    width: min(88vw, 82vh, 620px);
    height: min(88vw, 82vh, 620px);
    transition: opacity 0.4s ease;
    z-index: 5;
  }
  #home.hidden { opacity: 0; pointer-events: none; }

  .tile {
    position: absolute;
    transform: translate(-50%, -50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    transition: transform 0.15s ease;
    background: none;
    border: none;
    outline: none;
    padding: 6px;
  }
  .tile:active { transform: translate(-50%, -50%) scale(0.92); }
  .tile:hover .icon-frame { filter: brightness(1.25); }
  .tile img, .tile * {
    pointer-events: none;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
  }

  .icon-frame {
    width: min(15vw, 12vh, 92px);
    height: min(15vw, 12vh, 92px);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: filter 0.15s ease;
  }
  .icon-frame img {
    width: 90%;
    height: 90%;
    object-fit: contain;
    image-rendering: pixelated;
  }
  .tile-label {
    color: #cfcfcf;
    font-size: 9px;
    letter-spacing: 1px;
    text-transform: uppercase;
    text-align: center;
    opacity: 0.9;
    white-space: nowrap;
  }

  #home-sub {
    position: fixed;
    bottom: 26px;
    left: 0; right: 0;
    text-align: center;
    color: #555;
    font-size: 10px;
    letter-spacing: 1px;
    z-index: 6;
    transition: opacity 0.4s ease;
  }
  #home-sub.hidden { opacity: 0; pointer-events: none; }

  .det-text {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px;
    text-align: center;
    font-size: clamp(13px, 3.6vw, 20px);
    line-height: 1.8;
    letter-spacing: 1px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.8s ease;
    z-index: 10;
  }
  .det-text.show { opacity: 1; }

  .pulse {
    animation: pulseHeart 1.1s infinite ease-in-out;
  }
  @keyframes pulseHeart {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.08); }
  }

  @media (hover: hover) {
    .tile { cursor: pointer; }
  }

  #nav-link {
    position: fixed;
    top: 24px;
    right: 20px;
    z-index: 6;
    transition: opacity 0.4s ease;
  }
  #nav-link.hidden { opacity: 0; pointer-events: none; }
  #nav-link a {
    color: #666;
    font-size: 8px;
    letter-spacing: 1px;
    text-decoration: none;
    border: 1px solid #333;
    padding: 6px 8px;
    border-radius: 4px;
    transition: color 0.2s ease, border-color 0.2s ease;
  }
  #nav-link a:hover {
    color: #ff0000;
    border-color: #ff0000;
  }
</style>
</head>

<script>
  const QUOTES = {"determination": ["Nunca desistir, não importa quantas vezes você caia... Isso te enche de determinação.", "A vontade de continuar, mesmo quando tudo parece perdido... Isso te enche de determinação.", "Levantar mais uma vez, sempre que for preciso... Isso te enche de determinação."], "bravery": ["Dar o primeiro passo em direção ao perigo... Isso te enche de coragem.", "Enfrentar o medo de cabeça erguida... Isso te enche de bravura.", "Agir mesmo quando o coração dispara... Isso te enche de bravura."], "perseverance": ["Aprender com os erros para seguir em frente... Isso te enche de perseverança.", "Continuar tentando, mesmo depois de cair... Isso te enche de perseverança.", "Seguir em frente, um passo de cada vez... Isso te enche de perseverança."], "integrity": ["Fazer a coisa certa mesmo quando ninguém está olhando... Isso te enche de integridade.", "Manter sua palavra, mesmo quando custa caro... Isso te enche de integridade.", "Ser o mesmo por dentro e por fora... Isso te enche de integridade."], "patience": ["Esperar pacientemente pelo momento certo... Isso te enche de paciência.", "Respirar fundo e deixar o tempo agir... Isso te enche de paciência.", "Persistir em silêncio até a hora certa chegar... Isso te enche de paciência."], "kindness": ["Cuidar e proteger quem precisa de ajuda... Isso te enche de bondade.", "Estender a mão sem esperar nada em troca... Isso te enche de bondade.", "Ver o outro antes de si mesmo... Isso te enche de bondade."], "justice": ["Agir com precisão para acabar com o caos... Isso te enche de justiça.", "Defender o que é certo, sem medo de julgar... Isso te enche de justiça.", "Equilibrar a balança com as próprias mãos... Isso te enche de justiça."]};
  const cycleIndex = {};

  const home = document.getElementById('home');
  const title = document.getElementById('title');
  const sub = document.getElementById('home-sub');
  const nav = document.getElementById('nav-link');
  const snd = document.getElementById('snd');
  let opened = false;

  document.querySelectorAll('.tile').forEach(tile => {
    tile.addEventListener('click', () => {
      if (opened) return;
      opened = true;
      const key = tile.dataset.key;
      const text = document.getElementById('text-' + key);

      if (!(key in cycleIndex)) cycleIndex[key] = 0;
      const list = QUOTES[key];
      const idx = cycleIndex[key] % list.length;
      text.textContent = list[idx];
      cycleIndex[key] = idx + 1;

      home.classList.add('hidden');
      title.classList.add('hidden');
      sub.classList.add('hidden');
      nav.classList.add('hidden');
      tile.querySelector('.icon-frame').classList.add('pulse');

      snd.currentTime = 0;
      snd.play().catch(() => {});

      text.classList.add('show');

      setTimeout(() => {
        text.classList.remove('show');
      }, 5000);

      setTimeout(() => {
        home.classList.remove('hidden');
        title.classList.remove('hidden');
        sub.classList.remove('hidden');
        nav.classList.remove('hidden');
        tile.querySelector('.icon-frame').classList.remove('pulse');
        opened = false;
      }, 6000);
    });
  });
</script>
