<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: #000;
    font-family: 'Press Start 2P', 'Courier New', monospace;
    overflow: hidden;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    position: relative;
  }

  #title {
    position: fixed;
    top: 24px;
    left: 0; right: 0;
    text-align: center;
    color: #999;
    font-size: 13px;
    letter-spacing: 3px;
    opacity: 0.85;
    z-index: 6;
    transition: opacity 0.4s ease;
  }
  #title.hidden { opacity: 0; pointer-events: none; }

  #home {
    position: relative;
    width: min(88vw, 82vh, 620px);
    height: min(88vw, 82vh, 620px);
    transition: opacity 0.4s ease;
    z-index: 5;
  }
  #home.hidden { opacity: 0; pointer-events: none; }

  .tile {
    position: absolute;
    transform: translate(-50%, -50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    transition: transform 0.15s ease;
    background: none;
    border: none;
    outline: none;
    padding: 6px;
  }
  .tile:active { transform: translate(-50%, -50%) scale(0.92); }
  .tile:hover .icon-frame { filter: brightness(1.3); }
  .tile img, .tile * {
    pointer-events: none;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
  }

  .icon-frame {
    width: min(15vw, 12vh, 92px);
    height: min(15vw, 12vh, 92px);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: filter 0.15s ease;
  }
  .icon-frame img {
    width: 90%;
    height: 90%;
    object-fit: contain;
    image-rendering: pixelated;
  }
  .tile-label {
    color: #999;
    font-size: 9px;
    letter-spacing: 1px;
    text-transform: uppercase;
    text-align: center;
    opacity: 0.9;
    white-space: nowrap;
  }

  #home-sub {
    position: fixed;
    bottom: 26px;
    left: 0; right: 0;
    text-align: center;
    color: #444;
    font-size: 10px;
    letter-spacing: 1px;
    z-index: 6;
    transition: opacity 0.4s ease;
  }
  #home-sub.hidden { opacity: 0; pointer-events: none; }

  .det-text {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px;
    text-align: center;
    font-size: clamp(13px, 3.6vw, 20px);
    line-height: 1.8;
    letter-spacing: 1px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.8s ease;
    z-index: 10;
  }
  .det-text.show { opacity: 1; }

  .shake {
    animation: shakeHeart 0.4s ease;
  }
  @keyframes shakeHeart {
    0%, 100% { transform: translate(0,0); }
    20% { transform: translate(-4px,2px); }
    40% { transform: translate(4px,-2px); }
    60% { transform: translate(-3px,-2px); }
    80% { transform: translate(3px,2px); }
  }

  #nav-link {
    position: fixed;
    top: 24px;
    right: 20px;
    z-index: 6;
    transition: opacity 0.4s ease;
  }
  #nav-link.hidden { opacity: 0; pointer-events: none; }
  #nav-link a {
    color: #444;
    font-size: 8px;
    letter-spacing: 1px;
    text-decoration: none;
    border: 1px solid #333;
    padding: 6px 8px;
    border-radius: 4px;
    transition: color 0.2s ease, border-color 0.2s ease;
  }
  #nav-link a:hover {
    color: #f0e68c;
    border-color: #f0e68c;
  }
</style>
</head>

<script>
  const QUOTES = {"give_up": ["Achar que nada mais faz sentido... Isso te consome de desespero.", "Abandonar o caminho antes do fim... Isso te enche de desistência.", "Deixar a esperança se apagar aos poucos... Isso te consome de desespero."], "cowardice": ["Fugir diante do perigo... Isso te enche de covardia.", "Esconder-se quando deveria agir... Isso te enche de covardia.", "Deixar o medo decidir por você... Isso te enche de covardia."], "inconstancy": ["Desistir no meio do caminho, de novo... Isso te enche de inconstância.", "Entregar os pontos antes de tentar de verdade... Isso te enche de rendição.", "Mudar de ideia sempre que fica difícil... Isso te enche de inconstância."], "corruption": ["Mentir mesmo sabendo a verdade... Isso te enche de desonestidade.", "Trair a confiança de quem acredita em você... Isso te enche de corrupção.", "Vender o que é certo pelo que é fácil... Isso te enche de corrupção."], "impulsivity": ["Agir sem pensar nas consequências... Isso te enche de impulsividade.", "Deixar a pressa decidir por você... Isso te enche de impulsividade.", "Pular antes de olhar... Isso te enche de impulsividade."], "cruelty": ["Ferir sem remorso quem precisa de ajuda... Isso te enche de crueldade.", "Rir da dor alheia... Isso te enche de crueldade.", "Escolher machucar quando podia ajudar... Isso te enche de crueldade."], "injustice": ["Fechar os olhos para o que é certo... Isso te enche de injustiça.", "Julgar sem ouvir, condenar sem provas... Isso te enche de injustiça.", "Usar o poder para prejudicar o outro... Isso te enche de injustiça."]};
  const cycleIndex = {};

  const home = document.getElementById('home');
  const title = document.getElementById('title');
  const sub = document.getElementById('home-sub');
  const nav = document.getElementById('nav-link');
  const snd = document.getElementById('snd');
  let opened = false;

  document.querySelectorAll('.tile').forEach(tile => {
    tile.addEventListener('click', () => {
      if (opened) return;
      opened = true;
      const key = tile.dataset.key;
      const text = document.getElementById('text-' + key);

      if (!(key in cycleIndex)) cycleIndex[key] = 0;
      const list = QUOTES[key];
      const idx = cycleIndex[key] % list.length;
      text.textContent = list[idx];
      cycleIndex[key] = idx + 1;

      home.classList.add('hidden');
      title.classList.add('hidden');
      sub.classList.add('hidden');
      nav.classList.add('hidden');
      tile.querySelector('.icon-frame').classList.add('shake');

      snd.currentTime = 0;
      snd.play().catch(() => {});

      text.classList.add('show');

      setTimeout(() => {
        text.classList.remove('show');
      }, 5000);

      setTimeout(() => {
        home.classList.remove('hidden');
        title.classList.remove('hidden');
        sub.classList.remove('hidden');
        nav.classList.remove('hidden');
        tile.querySelector('.icon-frame').classList.remove('shake');
        opened = false;
      }, 6000);
    });
  });
</script>
