<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: #000;
    color: #ccc;
    font-family: 'Press Start 2P', 'Courier New', monospace;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
  }
  body {
    position: relative;
    min-height: 100vh;
  }

  #sans-gate {
    position: fixed;
    inset: 0;
    z-index: 30;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: opacity 0.6s ease;
  }
  #sans-gate.hidden { opacity: 0; pointer-events: none; }
  #sans-gate-text {
    font-size: 10px;
    letter-spacing: 3px;
    color: #4a90c2;
    animation: gatePulse 1.8s ease-in-out infinite;
  }
  @keyframes gatePulse { 0%, 100% { opacity: 0.35; } 50% { opacity: 1; } }

  #ambient-light {
    position: fixed;
    inset: 0;
    z-index: -1;
    pointer-events: none;
    background: radial-gradient(circle at 50% 42%, rgba(90,160,220,0.06), transparent 55%);
    animation: ambientPulse 7s ease-in-out infinite;
  }
  @keyframes ambientPulse {
    0%, 100% { opacity: 0.6; }
    50% { opacity: 1; }
  }

  #back-link {
    position: fixed;
    top: 20px;
    left: 20px;
    color: #555;
    font-size: 8px;
    letter-spacing: 1px;
    text-decoration: none;
    border: 1px solid #2a2a2a;
    padding: 6px 8px;
    border-radius: 4px;
    z-index: 25;
    transition: color 0.2s ease, border-color 0.2s ease;
  }
  #back-link:hover { color: #4a90c2; border-color: #4a90c2; }

  #sans-stage {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 22px;
    padding: 24px;
    cursor: pointer;
  }

  #line-label {
    font-size: 9px;
    letter-spacing: 3px;
    color: #666;
    opacity: 0;
    transition: opacity 1.2s ease;
  }
  #line-label.show { opacity: 1; }

  #sans-portrait-wrap {
    opacity: 0;
    transition: opacity 2.2s ease;
  }
  #sans-portrait-wrap.show { opacity: 1; }
  #sans-portrait-wrap img {
    width: min(38vw, 170px);
    image-rendering: pixelated;
    filter: drop-shadow(0 0 18px rgba(90,160,220,0.18));
  }

  #sans-dialogue {
    opacity: 0;
    transform: translateY(12px);
    transition: opacity 1s ease, transform 1s ease;
    width: min(560px, 92vw);
  }
  #sans-dialogue.show { opacity: 1; transform: translateY(0); }

  .dialogue-box {
    display: flex;
    align-items: center;
    gap: 14px;
    background: rgba(6,10,14,0.94);
    border: 3px solid #3a6d94;
    border-radius: 6px;
    padding: 16px 18px;
    box-shadow: 0 0 26px rgba(0,0,0,0.65);
    color: #ddd;
  }

<script>
  // ======= piadas originais de osso e esqueleto, escritas pra este site =======
  // (não são falas do jogo — o sans daqui só sabe piada ruim mesmo)
  const JOKES = [
    "por que o esqueleto nao briga com ninguem? porque ele nao tem estomago pra isso.",
    "qual e o osso favorito do esqueleto? nenhum, ele ja tem todos.",
    "essa piada e osso-terrivel, mas garanto que vai te quebrar o gelo.",
    "eu ia contar uma piada sobre esqueletos... mas acho que nao tenho estrutura pra isso.",
    "por que o esqueleto nao confia em ninguem? porque ele consegue ver atraves de todo mundo.",
    "toda vez que eu rio de uma piada ruim, alguma coisa estala. deve ser a clavicula. ou o meu senso de humor.",
    "por que o esqueleto ficou sozinho na festa? ninguem quis 'costela' companhia.",
    "meu trabalho e osso, literalmente. nunca sobra carne pra reclamar.",
    "por que o esqueleto vive tao calmo? ele perdeu os nervos ha muito tempo.",
    "pode confiar, essa piada tem fundamento. bem la no femur.",
    "por que o esqueleto nao empresta dinheiro? ele nao tem costela sobrando.",
    "dizem que eu sou preguicoso. mas eu so sei economizar energia... literalmente, nao tenho musculo pra gastar.",
    "todo mundo tem um esqueleto no armario. o meu sou eu mesmo.",
    "essa piada e tao boa que vai deixar seus ossos doendo de rir. ou isso e so a minha postura mesmo.",
    "eu contaria uma piada sobre a coluna... mas ela sempre me abandona no meio.",
    "sabe por que o esqueleto foi mal na prova? faltou-lhe personalidade, nao materia.",
    "por que o esqueleto foi sozinho pro baile? ele nao tinha ninguem... literalmente, nenhum corpo pra chamar.",
    "o que o esqueleto pediu no restaurante? costelinha. ele tinha uma de sobra em casa.",
    "por que o esqueleto e tao tranquilo? nada consegue penetrar a pele dele, ja que ele nao tem pele.",
    "como o esqueleto liga pros amigos? no ossofone, e a ligacao nunca cai.",
    "por que o esqueleto nao toca musica de igreja? porque ele nao tem orgao. nenhum orgao mesmo.",
    "o que o esqueleto disse antes de comer? bom ossopetite.",
    "por que o esqueleto detesta a sala de estar? porque tem 'vida' no nome e ele ja nao tem mais disso.",
    "como se chama um esqueleto preguicoso que nao sai da cama? osso-duro-de-acordar.",
    "por que o esqueleto foi no medico? pra fazer um raio-x. ele ja sabia o resultado de cor.",
    "qual e o genero de filme favorito do esqueleto? terror. ele sempre se ve no espelho e leva um susto.",
    "por que o esqueleto nao gosta de festa do pijama? porque todo mundo pergunta onde ficou o resto dele.",
    "o esqueleto tentou fazer academia, mas desistiu. treino puxado deixa osso doendo por semanas.",
    "por que o esqueleto nunca perde no par ou impar? ele so mostra os dedos que sobraram.",
    "qual e o marmita do esqueleto? nada, ele vive de caldo de osso mesmo.",
    "por que o esqueleto nao anda de moto? ele ja e caveira o suficiente sem capacete.",
    "o esqueleto entrou numa banda. tocava so os ossos, mas o ritmo era certeiro.",
    "por que o esqueleto sempre chega atrasado? ele nao tem pressa, ja tem todo o tempo do mundo pela frente.",
    "essa piada e tao antiga quanto meus ossos. e olha que eu ja nasci velho.",
    "por que o esqueleto foi reprovado na entrevista de emprego? faltou-lhe um bom curriculum vitae... e carne tambem.",
    "o esqueleto adora inverno. e a unica epoca que ele nao sente frio, porque frio ele sente o ano inteiro.",
    "por que o esqueleto e otimo em matematica? ele sabe contar cada osso de cabeca."
  ];

  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  let deck = shuffle(JOKES);
  let deckIndex = 0;

  function nextJoke() {
    if (deckIndex >= deck.length) {
      deck = shuffle(JOKES);
      deckIndex = 0;
    }
    return deck[deckIndex++];
  }

  // ======= sprite das expressoes: 5 rostos em 1 linha =======
  const FACE_COLS = 5;

  function setRandomFace() {
    const col = Math.floor(Math.random() * FACE_COLS);
    const posX = (col / (FACE_COLS - 1)) * 100;
    faceIcon.style.backgroundPosition = posX + "% 0%";
  }

  const gate = document.getElementById("sans-gate");
  const stage = document.getElementById("sans-stage");
  const lineLabel = document.getElementById("line-label");
  const portraitWrap = document.getElementById("sans-portrait-wrap");
  const dialogueWrap = document.getElementById("sans-dialogue");
  const jokeLine = document.getElementById("joke-line");
  const faceIcon = document.getElementById("face-icon");
  const tapHint = document.getElementById("tap-hint");
  const voiceSfx = document.getElementById("voice-sfx");
  const bgMusic = document.getElementById("bg-music");

  function playVoiceTick() {
    // toca em loop enquanto ele fala; se o audio for curto, repete sozinho ate acabar a fala
    voiceSfx.loop = true;
    voiceSfx.currentTime = 0;
    voiceSfx.play().catch(() => {});
  }

  function stopVoice() {
    // corta o som exatamente no instante em que ele para de falar
    voiceSfx.pause();
    voiceSfx.currentTime = 0;
  }

  let typeTimer = null;
  let typing = false;
  let started = false;

  function typeText(text) {
    clearInterval(typeTimer);
    jokeLine.textContent = "";
    let i = 0;
    typing = true;
    playVoiceTick();
    typeTimer = setInterval(() => {
      if (i >= text.length) {
        clearInterval(typeTimer);
        typing = false;
        stopVoice();
        return;
      }
      jokeLine.textContent += text[i];
      i++;
    }, 32);
  }

  function showNextJoke() {
    if (typing) {
      // se ainda esta digitando, so completa a fala na hora
      clearInterval(typeTimer);
      typing = false;
      jokeLine.textContent = deck[deckIndex - 1];
      stopVoice();
      return;
    }
    setRandomFace();
    typeText(nextJoke());
  }

  gate.addEventListener("click", () => {
    gate.classList.add("hidden");
    started = true;

    bgMusic.volume = 0.5;
    bgMusic.play().catch(() => {});

    lineLabel.classList.add("show");
    setTimeout(() => portraitWrap.classList.add("show"), 200);
    setTimeout(() => {
      dialogueWrap.classList.add("show");
      setRandomFace();
      typeText(nextJoke());
    }, 900);
    setTimeout(() => tapHint.classList.add("show"), 2600);
  }, { once: true });

  stage.addEventListener("click", () => {
    if (!started) return;
    showNextJoke();
  });
</script>
